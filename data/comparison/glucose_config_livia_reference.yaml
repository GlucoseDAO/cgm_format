# Reference output for cgm_format alignment tests (generated by glucose_data_processing).
#
# Calibration policy (inference parity):
#   - remove_calibration: true — drop Calibration event rows at parse (same as training parse)
#   - remove_after_calibration: false — do NOT purge 24h after sensor gaps (cgm_format marks only)
#   - remove_after_calibration_hours: 0 — belt-and-suspenders; no post-gap deletion window
#
# Regenerate reference CSV:
#   uv run python scripts/generate_livia_reference.py --force

expected_interval_minutes: 5
small_gap_max_minutes: 15
min_sequence_len: 200
save_intermediate_files: false
create_fixed_frequency: true
glucose_only: false
round_precision: 3
calibration_period_minutes: 165
remove_after_calibration: false
remove_after_calibration_hours: 0

restrict_output_to_config_fields: true
service_fields_allowlist:
  - "sequence_id"

output_fields:
  - "sequence_id"
  - "timestamp"
  - "glucose_value_mgdl"
  - "fast_acting_insulin_u"
  - "long_acting_insulin_u"
  - "carb_grams"

field_to_display_name_map:
  timestamp: "datetime"
  glucose_value_mgdl: "glucose"
  fast_acting_insulin_u: "insulin_fast"
  long_acting_insulin_u: "insulin_slow"
  carb_grams: "carbs"

dexcom:
  high_glucose_value: 401
  low_glucose_value: 39
  remove_calibration: true
  remove_after_calibration_hours: 0
